{% extends 'base.html' %}
{% block content %}

<h2 class="title">My Orders</h2>

{% for order in orders %}
<div class="order">
  <b>Order #{{ order.id }}</b><br>
  Date: {{ order.ordered_at }} <br>
  Total: ₹{{ order.total_price }} <br>
  Status: <b>{{ order.status }}</b>
</div>
{% empty %}
<p>No orders yet</p>
{% endfor %}

{% endblock %}
