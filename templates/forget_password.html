{% extends "base.html" %}

{% block content %}

<style>
    .forget-wrapper {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6a00, #ee0979);
        padding: 20px;
    }

    .forget-card {
        background: #ffffff;
        width: 400px;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        text-align: center;
    }

    .forget-card h2 {
        margin-bottom: 10px;
        color: #333;
    }

    .forget-card p {
        font-size: 14px;
        color: #666;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-group label {
        font-weight: 600;
        font-size: 14px;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: #ee0979;
    }

    .btn-submit {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #ee0979;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-submit:hover {
        background: #d4086e;
    }

    .messages {
        margin-bottom: 15px;
    }

    .messages div {
        padding: 8px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 5px;
    }

    .error {
        background: #ffe5e5;
        color: #b30000;
    }

    .success {
        background: #e6ffe6;
        color: #006600;
    }

    .back-link {
        margin-top: 15px;
        font-size: 14px;
    }

    .back-link a {
        text-decoration: none;
        color: #ee0979;
        font-weight: 600;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="forget-wrapper">
    <div class="forget-card">

        <h2>🔐 Forgot Password</h2>
        <p>Enter your registered email to receive OTP</p>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn-submit">Send OTP</button>
        </form>

        <div class="back-link">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>

    </div>
</div>

{% endblock %}
